<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraVision - AI Flower Classifier</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="welcome-bg">
        <div class="gradient-waves">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
        </div>
    </div>

    <div class="welcome-container">
        <div class="welcome-card">
            <div class="logo">
                <h1>FloraVision</h1>
                <p class="tagline">AI-Powered Flower Identification</p>
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-camera"></i>
                    </div>
                    <h3>Instant ID</h3>
                    <p>Upload any flower photo and get instant identification</p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <h3>25 Species</h3>
                    <p>Recognizes 25 beautiful flower species</p>
                </div>

                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <h3>History</h3>
                    <p>Track your identification history</p>
                </div>
            </div>

            <a href="/home" class="cta-button">
                <span>Enter App</span>
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>
    </div>

</body>
</html>
